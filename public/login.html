<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — IP Trap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      position: relative; z-index: 1;
    }
    .login-card {
      background: rgba(14,14,31,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%; max-width: 400px;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.4);
      animation: fadeUp 0.5s ease both;
    }
    .login-icon {
      font-size: 40px; text-align: center; margin-bottom: 8px;
    }
    .login-title {
      font-size: 26px; font-weight: 800; text-align: center;
      margin-bottom: 4px; letter-spacing: -0.5px;
    }
    .login-sub {
      text-align: center; color: var(--text-muted); font-size: 14px;
      margin-bottom: 36px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-muted); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); padding: 14px 16px;
      border-radius: 12px; font-size: 15px;
      font-family: var(--font); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; padding: 15px;
      border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: var(--font);
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 8px;
    }
    .login-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171; border-radius: 10px;
      padding: 12px 16px; font-size: 14px;
      margin-top: 16px; display: none; text-align: center;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h1 class="login-title">Admin Login</h1>
      <p class="login-sub">IP Trap Dashboard — Akses Terbatas</p>

      <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="login-btn" id="login-btn">Login →</button>
        <div class="error-msg" id="error-msg">Username atau password salah.</div>
      </form>
    </div>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errEl.classList.remove('show');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/admin.html';
        } else {
          errEl.textContent = data.message || 'Login gagal.';
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Login →';
          document.getElementById('password').value = '';
        }
      } catch {
        errEl.textContent = 'Koneksi ke server gagal.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Login →';
      }
    }
  </script>
</body>
</html>
